name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Unzip project
        run: unzip OTGActivator_v2.zip
      - name: Build APK
        run: |
          cd OTGActivator
          chmod +x gradlew
          ./gradlew assembleDebug
      - uses: actions/upload-artifact@v3
        with:
          name: OTGActivator-debug
          path: OTGActivator/app/build/outputs/apk/debug/app-debug.apk
