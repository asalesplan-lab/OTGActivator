name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip project
        run: unzip OTGActivator_v3.zip

      - name: Fix gradlew and download wrapper jar
        run: |
          cd OTGActivator
          cat > gradlew << 'EOF'
          #!/bin/sh
          APP_HOME="$(cd "$(dirname "$0")" && pwd)"
          CLASSPATH="$APP_HOME/gradle/wrapper/gradle-wrapper.jar"
          if [ -n "$JAVA_HOME" ]; then
            JAVACMD="$JAVA_HOME/bin/java"
          else
            JAVACMD="java"
          fi
          exec "$JAVACMD" -classpath "$CLASSPATH" org.gradle.wrapper.GradleWrapperMain "$@"
          EOF
          chmod +x gradlew
          curl -L "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
               -o gradle/wrapper/gradle-wrapper.jar

      - name: Build APK
        run: |
          cd OTGActivator
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: OTGActivator-debug
          path: OTGActivator/app/build/outputs/apk/debug/app-debug.apk
